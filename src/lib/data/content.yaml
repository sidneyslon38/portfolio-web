    title: Where the Sidewalk Ends, A Plaza Grows in Brooklyn
    pubdate: 01/08/2026
    outlet: New York City News Service
    image: /portfolio_images/pedplaza-image.jpg
    imageAlt: Trash collects along the Caesar’s Bay waterfront, October 2025
    description: A South Brooklyn non-profit announced plans to convert their neighborhood's neglected waterfront into a pedestrian plaza. It would be one of the first of its kind in the city, but the project faces delays and an immense amount of garbage. 
