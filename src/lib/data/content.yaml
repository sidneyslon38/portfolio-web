profile:
  name: Hi, I'm Sid
  tagline: NYC-based journalist, writer and creative.
  photo: /portfolio_graphics/nb_and_pen.png
  photoAlt: A pixel-art drawing of a reporter's notebook and pen.
  email: sidslon@gmail.com
  github: sidneyslon38
  linkedin: sidneyslon
  bio: |
    I'm a graduate student at the CUNY Craig Newmark Graduate School of Journalism, focused on the intersection of data, climate reporting and local accountability to present important stories for all New Yorkers. 
    
    I'm looking for an opportunity at a U.S. newsroom that allows me to work on multiple fronts, as a data analyst, shoe-leather reporter, and visual storyteller.
  
